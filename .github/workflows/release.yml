name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'minor'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  release:
    name: Bump, tag, and publish release notes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history: tags + merge log feed the changelog
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # The same quality gates as CI — a release never ships red. `build` is
      # included because lint/typecheck/test do NOT exercise the Next.js bundle:
      # a client/server import split that only breaks `next build` (as in
      # v1.0.1) would otherwise sail through and tag an unbuildable release.
      - run: pnpm turbo run lint typecheck test build
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
          JWT_SECRET: 'ci-build-secret-minimum-32-characters-long'
      - run: pnpm docs:check

      - name: Bump versions + scaffold changelog
        id: bump
        run: node scripts/release.mjs --bump ${{ inputs.bump }}

      - name: Commit, tag, push
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/web/package.json apps/cli/package.json docs/changelogs/
          git commit -m "chore(release): v${VERSION}"
          # Annotated tag, pushed explicitly — `--follow-tags` skips
          # lightweight tags, which silently dropped the tag in v0.11.0.
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin main "refs/tags/v${VERSION}"
          # Hand the bump commit's SHA to the docker job. Without this it would
          # check out github.sha (the pre-bump dispatch commit) and bake the
          # PREVIOUS version into the image — e.g. the 1.0.5 image reported 1.0.4.
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # Notes come from the scaffolded changelog (merged-PR list) — the
          # generate-notes API endpoint rejects auth in this environment, so
          # the flow never depends on it.
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "docs/changelogs/v${VERSION}.md"

  # Publish the Docker image and notify the Umbrel app store. Called directly
  # (not via the `release: published` event) because GitHub does not trigger
  # workflows from releases the bot creates with GITHUB_TOKEN.
  docker:
    name: Publish Docker image
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag: ${{ needs.release.outputs.version }}
      ref: ${{ needs.release.outputs.sha }}
    secrets: inherit
