name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Runs from the repo root on purpose. `pnpm audit` always resolves the
      # shared workspace lockfile, so a `working-directory` here would be a
      # no-op — it audits every workspace package either way, which is why
      # reported paths look like `apps__docs>next>sharp`. `--prod` drops
      # devDependencies but keeps optionalDependencies, so transitive optional
      # deps (next > sharp) stay in scope.
      - name: Check for known vulnerabilities
        run: pnpm audit --prod --audit-level=high
