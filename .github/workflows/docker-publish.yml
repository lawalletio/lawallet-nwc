name: Docker Publish

# Builds the apps/web image for linux/amd64 + linux/arm64 and pushes it to
# Docker Hub. Runs on a published GitHub Release (tagging the release version +
# latest) or on manual dispatch. Never runs on PR/push, so normal CI is
# unaffected and missing secrets only surface when this workflow is invoked.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. 1.0.0). Defaults to package.json version.'
        required: false
        type: string

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: masize/lawallet-nwc

jobs:
  publish:
    name: Build + push multi-arch image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tags.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        env:
          TAG_INPUT: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$TAG_INPUT" ]; then
            VERSION="$TAG_INPUT"
          elif [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"   # strip leading v (e.g. v1.0.0 -> 1.0.0)
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${IMAGE}:${VERSION} and ${IMAGE}:latest"

      # QEMU lets the amd64/arm64 builds run on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tags.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-umbrel-app-store:
    name: Request Umbrel app package update
    runs-on: ubuntu-latest
    needs: publish
    steps:
      # Requires a repository secret with write access to
      # lawalletio/umbrel-app-store contents so repository_dispatch can cross
      # the repository boundary after the Docker image is published.
      - name: Dispatch package update
        env:
          GH_TOKEN: ${{ secrets.UMBREL_APP_STORE_DISPATCH_TOKEN }}
          VERSION: ${{ needs.publish.outputs.version }}
          IMAGE_REPOSITORY: ${{ env.IMAGE }}
          SOURCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing UMBREL_APP_STORE_DISPATCH_TOKEN. Configure a token with write access to lawalletio/umbrel-app-store contents so this workflow can create a repository_dispatch event."
            exit 1
          fi

          python3 <<'PY' > /tmp/umbrel-app-store-dispatch.json
          import json
          import os

          version = os.environ["VERSION"]
          image = f"{os.environ['IMAGE_REPOSITORY']}:{version}"

          print(json.dumps({
              "event_type": "lawallet-nwc-release",
              "client_payload": {
                  "version": version,
                  "image": image,
                  "source_repository": os.environ["GITHUB_REPOSITORY"],
                  "source_sha": os.environ["GITHUB_SHA"],
                  "source_run_url": os.environ["SOURCE_RUN_URL"],
              },
          }))
          PY

          gh api \
            --method POST \
            repos/lawalletio/umbrel-app-store/dispatches \
            --input /tmp/umbrel-app-store-dispatch.json
