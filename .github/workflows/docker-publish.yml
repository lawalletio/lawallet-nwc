name: Docker Publish

# Builds the apps/web AND apps/listener images for linux/amd64 + linux/arm64
# and pushes them to Docker Hub. Invoked by the Release workflow
# (workflow_call) right after the GitHub Release is cut, on a published GitHub
# Release (for releases created by hand in the UI), or on manual dispatch.
# Never runs on PR/push, so normal CI is unaffected and missing secrets only
# surface when this workflow is invoked.
#
# Each image × architecture builds on its OWN native runner (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm) and pushes by digest; a final
# `merge` job stitches the per-arch digests into one multi-arch manifest per
# image. This replaces the previous single-runner QEMU emulation of arm64,
# which dominated build time.
#
# Note: the `release: published` event does NOT fire for releases created by the
# Release workflow, because GitHub suppresses workflow triggers from events made
# with the default GITHUB_TOKEN. The automated path therefore relies on
# workflow_call, not on the release event.
on:
  workflow_call:
    inputs:
      tag:
        description: 'Image tag to push (e.g. 1.0.0). Defaults to package.json version.'
        required: false
        type: string
      ref:
        description: 'Git ref/SHA to build. Defaults to the triggering commit — but the release flow MUST pass the bump commit, else the image bakes the previous version.'
        required: false
        type: string
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. 1.0.0). Defaults to package.json version.'
        required: false
        type: string
      ref:
        description: 'Git ref/SHA to build (defaults to the triggering commit).'
        required: false
        type: string

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  WEB_IMAGE: masize/lawallet-nwc
  LISTENER_IMAGE: masize/lawallet-nwc-listener

jobs:
  build:
    name: Build ${{ matrix.image }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            repository: masize/lawallet-nwc
            dockerfile: apps/web/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: web
            repository: masize/lawallet-nwc
            dockerfile: apps/web/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: listener
            repository: masize/lawallet-nwc-listener
            dockerfile: apps/listener/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: listener
            repository: masize/lawallet-nwc-listener
            dockerfile: apps/listener/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          # Empty ref → default (the triggering commit). The release flow passes
          # the bump commit SHA so the image bakes the just-released version
          # (without this it would build the pre-bump commit — the bug #53 fixed).
          ref: ${{ inputs.ref }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build natively for this arch and push the image by digest (untagged).
      # The merge job assembles the tagged manifest from the per-arch digests.
      # provenance/sbom are disabled so each push is a single clean image
      # manifest (no "unknown/unknown" attestation entries), keeping the final
      # manifest list to exactly amd64 + arm64.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ matrix.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.image }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifests
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version: ${{ steps.tags.outputs.version }}
    steps:
      # Checkout the same ref the build job used so the package.json version
      # fallback resolves the just-released version, not the dispatch commit's.
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Download web digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests/web
          pattern: digests-web-*
          merge-multiple: true

      - name: Download listener digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests/listener
          pattern: digests-listener-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          TAG_INPUT: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$TAG_INPUT" ]; then
            VERSION="$TAG_INPUT"
          elif [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"   # strip leading v (e.g. v1.0.0 -> 1.0.0)
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${WEB_IMAGE}:${VERSION}, ${LISTENER_IMAGE}:${VERSION} and :latest tags"

      - name: Create and push web manifest list
        working-directory: /tmp/digests/web
        run: |
          docker buildx imagetools create \
            -t "${WEB_IMAGE}:${{ steps.tags.outputs.version }}" \
            -t "${WEB_IMAGE}:latest" \
            $(printf '${{ env.WEB_IMAGE }}@sha256:%s ' *)

      - name: Create and push listener manifest list
        working-directory: /tmp/digests/listener
        run: |
          docker buildx imagetools create \
            -t "${LISTENER_IMAGE}:${{ steps.tags.outputs.version }}" \
            -t "${LISTENER_IMAGE}:latest" \
            $(printf '${{ env.LISTENER_IMAGE }}@sha256:%s ' *)

      - name: Inspect published manifests
        run: |
          docker buildx imagetools inspect "${WEB_IMAGE}:${{ steps.tags.outputs.version }}"
          docker buildx imagetools inspect "${LISTENER_IMAGE}:${{ steps.tags.outputs.version }}"

  notify-umbrel-app-store:
    name: Request Umbrel app package update
    runs-on: ubuntu-latest
    needs: merge
    steps:
      # Requires a repository secret with write access to
      # lawalletio/umbrel-app-store contents so repository_dispatch can cross
      # the repository boundary after the Docker images are published.
      - name: Dispatch package update
        env:
          GH_TOKEN: ${{ secrets.UMBREL_APP_STORE_DISPATCH_TOKEN }}
          VERSION: ${{ needs.merge.outputs.version }}
          IMAGE_REPOSITORY: ${{ env.WEB_IMAGE }}
          LISTENER_IMAGE_REPOSITORY: ${{ env.LISTENER_IMAGE }}
          SOURCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing UMBREL_APP_STORE_DISPATCH_TOKEN. Configure a token with write access to lawalletio/umbrel-app-store contents so this workflow can create a repository_dispatch event."
            exit 1
          fi

          python3 <<'PY' > /tmp/umbrel-app-store-dispatch.json
          import json
          import os

          version = os.environ["VERSION"]
          image = f"{os.environ['IMAGE_REPOSITORY']}:{version}"
          listener_image = f"{os.environ['LISTENER_IMAGE_REPOSITORY']}:{version}"

          print(json.dumps({
              "event_type": "lawallet-nwc-release",
              "client_payload": {
                  "version": version,
                  "image": image,
                  "listener_image": listener_image,
                  "source_repository": os.environ["GITHUB_REPOSITORY"],
                  "source_sha": os.environ["GITHUB_SHA"],
                  "source_run_url": os.environ["SOURCE_RUN_URL"],
              },
          }))
          PY

          gh api \
            --method POST \
            repos/lawalletio/umbrel-app-store/dispatches \
            --input /tmp/umbrel-app-store-dispatch.json

  notify-start9-app-store:
    name: Request Start9 app package update
    runs-on: ubuntu-latest
    needs: merge
    steps:
      # Requires a repository secret with write access to
      # lawalletio/lawallet-startos contents so repository_dispatch can cross
      # the repository boundary after the Docker image is published.
      - name: Dispatch package update
        env:
          GH_TOKEN: ${{ secrets.START9_APP_STORE_DISPATCH_TOKEN }}
          VERSION: ${{ needs.merge.outputs.version }}
          IMAGE_REPOSITORY: ${{ env.WEB_IMAGE }}
          SOURCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing START9_APP_STORE_DISPATCH_TOKEN. Configure a token with write access to lawalletio/lawallet-startos contents so this workflow can create a repository_dispatch event."
            exit 1
          fi

          python3 <<'PY' > /tmp/start9-app-store-dispatch.json
          import json
          import os

          version = os.environ["VERSION"]
          image = f"{os.environ['IMAGE_REPOSITORY']}:{version}"

          print(json.dumps({
              "event_type": "lawallet-nwc-release",
              "client_payload": {
                  "version": version,
                  "image": image,
                  "source_repository": os.environ["GITHUB_REPOSITORY"],
                  "source_sha": os.environ["GITHUB_SHA"],
                  "source_run_url": os.environ["SOURCE_RUN_URL"],
              },
          }))
          PY

          gh api \
            --method POST \
            repos/lawalletio/lawallet-startos/dispatches \
            --input /tmp/start9-app-store-dispatch.json
