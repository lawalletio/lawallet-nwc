services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lawallet}
      POSTGRES_USER: ${POSTGRES_USER:-lawallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawallet_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${PORT:-2288}:${PORT:-2288}'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lawallet}:${POSTGRES_PASSWORD:-lawallet_password}@postgres:5432/${POSTGRES_DB:-lawallet}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-2288}
      JWT_SECRET: ${JWT_SECRET:-lawallet_local_development_secret_change_me_please}
      # NWC listener bridge — web works without these, but with them the NWC
      # driver reuses the listener's open relay connections and accepts its
      # payment webhooks. No depends_on: the listener is optional by design.
      LISTENER_URL: http://listener:${LISTENER_PORT:-4100}
      LISTENER_AUTH_SECRET: ${LISTENER_AUTH_SECRET:-lawallet_local_development_listener_secret_change_me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:$$PORT/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  listener:
    build:
      context: .
      dockerfile: apps/listener/Dockerfile
    ports:
      - '${LISTENER_PORT:-4100}:${LISTENER_PORT:-4100}'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lawallet}:${POSTGRES_PASSWORD:-lawallet_password}@postgres:5432/${POSTGRES_DB:-lawallet}
      LISTENER_PORT: ${LISTENER_PORT:-4100}
      LISTENER_AUTH_SECRET: ${LISTENER_AUTH_SECRET:-lawallet_local_development_listener_secret_change_me}
      WEB_ORIGIN: http://web:${PORT:-2288}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:$$LISTENER_PORT/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    ports:
      - '${DOCS_PORT:-3000}:${DOCS_PORT:-3000}'
    environment:
      DOCS_PORT: ${DOCS_PORT:-3000}
      DOCS_HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:$$DOCS_PORT/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  openapi:
    build:
      context: .
      dockerfile: packages/openapi/Dockerfile
    ports:
      - '${OPENAPI_PORT:-4500}:${OPENAPI_PORT:-4500}'
    environment:
      OPENAPI_HOST: 0.0.0.0
      OPENAPI_PORT: ${OPENAPI_PORT:-4500}
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-http://127.0.0.1:2288}
      NODE_ENV: ${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:$$OPENAPI_PORT/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME:-lawallet_postgres_data}
