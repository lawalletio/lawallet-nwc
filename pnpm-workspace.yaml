  brace-expansion@<2: 1.1.13
  brace-expansion@>=2.0.0 <2.0.3: 2.0.3
  ajv@<7: 6.14.0
  postcss: 8.5.15
  esbuild: 0.28.1
  vite: 6.4.3
  ws: 8.21.0
